<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汪楚尧 · 收藏与策展</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary:#FAF8F3; --bg-warm:#F5F2EB; --bg-card:#FFFFFF;
  --text-primary:#4A3728; --text-secondary:#5C4A3D; --text-muted:#9C948A;
  --gold:#8A4038; --gold-dim:#9E5248; --gold-glow:rgba(138,64,56,0.08);
  --heading-gold:#8A4038; --item-title:#6B3A2A;
  --border:#E8E3DA; --border-light:#EDE9E1;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg-primary);}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.header{text-align:center;padding:48px 24px 32px;background:linear-gradient(180deg,#F3F0E7 0%,var(--bg-primary) 100%);}
.header h1{font-family:'Noto Serif SC',serif;font-size:36px;font-weight:900;letter-spacing:8px;color:var(--heading-gold);}
.header-en{font-family:'Cinzel',serif;font-size:36px;font-weight:500;letter-spacing:4px;color:var(--heading-gold);margin-left:6px;text-transform:uppercase;}
.header-subtitle{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:600;color:var(--heading-gold);margin-top:14px;line-height:2;letter-spacing:2px;}

.neo-divider{display:flex;align-items:center;justify-content:center;gap:16px;padding:6px 0;width:50%;max-width:400px;margin:0 auto;}
.neo-divider .nd-line{flex:1;height:1px;background:var(--gold);opacity:0.5;}
.neo-divider .nd-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:0.6;flex-shrink:0;}

.tabs-container{position:sticky;top:0;z-index:100;background:rgba(250,248,243,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.tabs-bar{display:flex;flex-wrap:wrap;justify-content:center;max-width:960px;margin:0 auto;}
.tab-btn{padding:15px 24px;border:none;background:transparent;font-family:'Noto Serif SC',serif;font-size:18px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.3s;white-space:nowrap;position:relative;letter-spacing:2px;}
.tab-btn:hover{color:var(--text-secondary);}
.tab-btn.active{color:var(--heading-gold);font-weight:700;}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--gold);}

.main{max-width:960px;margin:0 auto;padding:0 20px 60px;}
.tab-content{display:none;animation:fadeIn 0.4s ease;}.tab-content.active{display:block;}

.section-header{text-align:center;padding:36px 0 8px;}
.section-title{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;color:var(--heading-gold);letter-spacing:4px;}
.section-subtitle{font-size:18px;color:var(--gold);margin-top:8px;font-family:'EB Garamond',serif;font-style:italic;letter-spacing:1px;}
.section-after-divider{padding-bottom:20px;}

.curator-statement{font-family:'Noto Serif SC',serif;font-size:18px;line-height:2.2;color:var(--heading-gold);max-width:580px;margin:0 auto;text-align:center;padding:12px 0 28px;}
.cabinet-statement{font-family:'Noto Serif SC',serif;font-size:18px;line-height:2;color:var(--heading-gold);max-width:580px;margin:0 auto;text-align:center;padding:14px 0 0;}
.cabinet-section-header{text-align:center;padding:12px 0 8px;}

.featured-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;padding:8px 0;}
.item-card{background:var(--bg-card);border:1px solid var(--border);border-radius:3px;overflow:hidden;cursor:pointer;transition:all 0.35s;position:relative;}
.item-card:hover{border-color:var(--gold);box-shadow:0 6px 24px rgba(0,0,0,0.06),0 0 0 1px var(--gold);transform:translateY(-3px);}
.item-card::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity 0.35s;}
.item-card:hover::before{opacity:0.6;}
.item-image{width:100%;background:var(--bg-warm);display:block;overflow:hidden;} /* [CHANGE] 移除固定height，图片恢复原始比例 */
.item-image img{width:100%;height:auto;display:block;transition:transform 0.6s;} /* [CHANGE] height:auto，移除object-fit:cover */
.item-card:hover .item-image img{transform:scale(1.03);}
.item-placeholder{font-family:'Cinzel',serif;font-size:42px;color:var(--border);}
.item-info{padding:16px 18px;}
.item-title{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;color:var(--item-title);line-height:1.7;}
.item-meta{font-size:16px;color:var(--text-muted);margin-top:6px;display:flex;gap:12px;align-items:center;font-family:'EB Garamond',serif;}
.item-tag{display:inline-block;padding:2px 10px;border-radius:2px;font-size:15px;font-weight:500;color:var(--gold);background:var(--gold-glow);border:1px solid rgba(138,64,56,0.15);letter-spacing:1px;font-family:'Noto Sans SC',sans-serif;}
.item-tag.sale{color:#A5503C;background:rgba(165,80,60,0.06);border-color:rgba(165,80,60,0.15);}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:0 0 24px;}
.filter-btn{padding:7px 18px;border:1px solid var(--border);border-radius:2px;background:transparent;color:var(--text-muted);font-size:16px;font-family:'Noto Sans SC',sans-serif;font-weight:500;cursor:pointer;transition:all 0.2s;letter-spacing:1px;}
.filter-btn:hover{border-color:var(--text-muted);color:var(--text-secondary);}
.filter-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-glow);}

.chronicle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;padding:8px 0;}
.chronicle-card{background:var(--bg-card);border:1px solid var(--border);border-radius:3px;overflow:hidden;cursor:pointer;transition:all 0.35s;}
.chronicle-card:hover{border-color:var(--gold);box-shadow:0 6px 24px rgba(0,0,0,0.06);transform:translateY(-3px);}
.chronicle-card .card-img{width:100%;aspect-ratio:1/1;overflow:hidden;background:var(--bg-warm);}
.chronicle-card .card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s;}
.chronicle-card:hover .card-img img{transform:scale(1.03);}
.chronicle-card .card-info{padding:14px 16px;}
.chronicle-card .card-title{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:600;color:var(--item-title);line-height:1.7;}
.article-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:10000;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);overflow-y:auto;padding:40px 20px;}
.article-modal.open{display:block;}
.article-modal-inner{max-width:1080px; /* [CHANGE] 720→1080px，另类历史文章宽度×1.5 */margin:0 auto;background:var(--bg-primary);border-radius:4px;padding:40px 36px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.article-modal-close{position:absolute;top:16px;right:20px;font-size:24px;color:var(--text-muted);cursor:pointer;background:none;border:none;transition:color 0.2s;}
.article-modal-close:hover{color:var(--text-primary);}
.article-modal-img{width:100%;max-width:720px;display:block;margin:0 auto 24px;border-radius:3px;border:1px solid var(--border);} /* [CHANGE] 图片最宽720px，居中，文章容器保持1080px */
.article-modal-title{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;color:var(--item-title);line-height:1.7;margin-bottom:8px;}
.article-modal-date{font-family:'EB Garamond',serif;font-size:16px;color:var(--text-muted);font-style:italic;margin-bottom:20px;}
.article-modal-body{font-family:'Noto Serif SC',serif;font-size:17px;line-height:2.2;color:var(--text-secondary);}

/* ============================================================
   GALLERY — changed from pointer-events:none to clickable
   ============================================================ */
.gallery-grid{column-count:4;column-gap:12px;padding:8px 0;}
/* [CHANGE] Removed pointer-events:none and user-select:none; added cursor:pointer and hover effect */
.gallery-item{
  break-inside:avoid;
  margin-bottom:12px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}
/* [CHANGE] Re-enabled pointer-events on img so clicks register; kept drag disabled */
.gallery-item img{
  width:100%;
  display:block;
  -webkit-user-drag:none;
  transition:transform 0.45s ease, opacity 0.3s ease;
}
/* [CHANGE] Subtle zoom + dim on hover to signal interactivity */
.gallery-item:hover img{
  transform:scale(1.04);
  opacity:0.88;
}
/* [CHANGE] Magnifier icon overlay on hover */
.gallery-item::after{
  content:'⊕';
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:rgba(250,248,243,0.9);
  opacity:0;
  transition:opacity 0.3s ease;
  pointer-events:none;
  text-shadow:0 1px 6px rgba(0,0,0,0.4);
}
.gallery-item:hover::after{opacity:1;}

.lightbox{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:10000;background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column;padding:40px;cursor:pointer;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90%;max-height:75vh;object-fit:contain;}
.lightbox-info{margin-top:20px;text-align:center;}
.lightbox-title{font-family:'Noto Serif SC',serif;font-size:23px;color:#F5F0E8;}
.lightbox-desc{font-size:17px;color:#A9A193;margin-top:8px;max-width:500px;line-height:1.8;font-family:'EB Garamond',serif;}
.lightbox-close{position:absolute;top:24px;right:28px;font-size:28px;color:#999;cursor:pointer;background:none;border:none;transition:color 0.2s;}
.lightbox-close:hover{color:#fff;}

.footer{text-align:center;padding:48px 24px;border-top:1px solid var(--border);}
.footer p{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:500;color:var(--gold);letter-spacing:2px;}
.footer p+p{margin-top:6px;}
.footer p span.en{font-family:'Cinzel',serif;letter-spacing:2px;margin-left:4px;}
.footer a{color:var(--gold);text-decoration:none;font-family:'Cinzel',serif;font-size:17px;letter-spacing:2px;}
.footer a:hover{text-decoration:underline;}

@media(max-width:640px){
  .header{padding:36px 16px 24px;}.header h1{font-size:24px;letter-spacing:4px;}.header-en{font-size:24px;letter-spacing:2px;margin-left:4px;}
  .tabs-bar{justify-content:center;padding:0 8px;}.tab-btn{padding:13px 14px;font-size:15px;}
  .featured-grid{grid-template-columns:repeat(2,1fr);gap:12px;}.chronicle-grid{grid-template-columns:repeat(2,1fr);gap:12px;}.gallery-grid{column-count:2;}
  .main{padding:0 14px 40px;}.item-info{padding:12px;}.item-title{font-size:15px;}
  .neo-divider{width:70%;}
}
</style>
</head>
<body>

<header class="header">
  <h1>汪楚尧 <span class="header-en">Julian</span></h1>
  <p class="header-subtitle">艺术品是对时间的僭越</p>
</header>

<nav class="tabs-container"><div class="tabs-bar" id="tabsBar"></div></nav>

<div class="main" id="mainContent">

  <div class="tab-content" id="tab-regalia"></div>
  <div class="tab-content" id="tab-treasures"></div>
  <div class="tab-content" id="tab-chronicles"></div>
  <div class="tab-content" id="tab-departures"></div>
  <div class="tab-content" id="tab-gallery"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox(event)">✕</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-info"><div class="lightbox-title" id="lightboxTitle"></div><div class="lightbox-desc" id="lightboxDesc"></div></div>
</div>

<div class="article-modal" id="articleModal" onclick="closeArticle(event)">
  <div class="article-modal-inner" onclick="event.stopPropagation()">
    <button class="article-modal-close" onclick="closeArticle(event)">✕</button>

    <div class="article-modal-title" id="articleTitle"></div>
    <div class="article-modal-date" id="articleDate"></div>
    <div class="article-modal-body" id="articleBody"></div>
  </div>
</div>

<footer class="footer">
  <div class="neo-divider" style="margin-bottom:20px"><div class="nd-line"></div><div class="nd-dot"></div><div class="nd-line"></div></div>
  <p>汪楚尧 <span class="en">Julian</span></p>

  <p><a href="https://curator.wangchuyao.com">curator.wangchuyao.com</a></p>
</footer>

    { id:"r003", title:"皇家空军上校梅斯礼服全套", year:"1956", origin:"英国", type:"晚宴梅斯礼服", highlight:false, image:"images/regalia/r003.jpg", description:"Gieves 制，皇家空军上校（Group Captain）梅斯礼服外套、马甲、长裤。蓝灰主色、中等厚度毛呢、前对扣闭合、侧翼金扣、黑色翻领，含飞行员刺绣徽章，对应空军基地指挥官身份。", forSale:false },
    { id:"r004", title:"皇家陆军医疗军团少校梅斯礼服", year:"1964", origin:"英国", type:"晚宴梅斯礼服", highlight:true, image:"images/regalia/r004.jpg", description:"Alkit 制，皇家陆军医疗军团少校（Major）梅斯礼服外套和马甲。黑主色、紫礼服领、中等厚度毛呢、前敞开、侧翼金扣，含杖蛇医疗徽章，与帝国战争博物馆诺曼底登陆口述史相印证。", forSale:false },

    { id:"t006", title:"康斯坦丁红十字骑士团主事官胸章", year:"约1950", origin:"英国", type:"勋章", highlight:false, image:"images/treasures/t006.jpg", description:"康斯坦丁红十字骑士团（Masonic & Military Order of the Red Cross of Constantine）主事官（Viceroy）级纪念版胸章。紫色罗缎绶带，錾花金质长方形别针；绶带下悬主教冠（Mitre）形金质吊饰，标志主事官职级。主体为红色珐琅四叶形章体，金色叠加凯乐符号（Chi-Rho，X·P）及字母 I·H·S·V，为该骑士团专属基督教密语体系。康斯坦丁红十字骑士团是与共济会相关的基督教兄弟会，会员以英国及英联邦精英阶层为主，礼仪等级通过可穿戴符号严格编码。此件与收藏中的英国军服构成平行关系——两者均是将社会等级与效忠对象物质化为服饰配件的制度性产物，差异仅在于一为国家军事体制，一为秘密骑士兄弟会。", forSale:false },

  ],
  chronicles: [
    { id:"c003", title:"一件礼服的战争与和平", date:"2026年", image:"images/regalia/r001.jpg", excerpt:"1982年5月4日，南大西洋，谢菲尔德号驱逆舰在巡逻途中遇阿根廷海军&ldquo;超级军旗&rdquo;舰载机发射的飞鱼导弹击中。导弹击穿舰体引发大火，舰长萨姆·索尔特下令弃舰。谢菲尔德号在被拖带数日后沉没，成为二战结束后第一艰被击沉的皮家海军战舰。二十名船员在这次袭击中罹难。<br><br>索尔特返回英国后，于1982年6月1日在 Moseley &amp; Pounsford 定制了这件少将常礼服外套。时间的选择耀人宻味：此时议会和媒体对谢菲尔德号事件的追责尚未平息，关于舰上通讯失误、导弹预警系统的质询正在进行。这件礼服很可能在随后的听证、仪式与公开场合中被穿着，见证了一名指挥官在舆论漩涡中维护自身荣誉的过程。<br><br>索尔特最终未被追责。此后他相继指挥南安普顿号驱逆舰，出任北伍德司令部作战助理参谋长，后升任国防情报局局长，晋升海军少将，主持海湾战争的皮家海军战略规划。1991年退役。2009年12月，索尔特因癌症去世，享年六十九岁。<br><br>于是，这件外套记录一场失败与随后漫长职业生涯之间的张力。" },
    { id:"c004", title:"两枚面孔，两个拿破仑", date:"2026年", image:"images/treasures/t002.jpg", excerpt:"<strong>正面：侧面像的政治学</strong><br><br>圣赫勒拿奖章正面，拿破仑一世以罗马皇帝的姿态出现：严格的侧面像，月桂花环加冕，头衔环绕。这套视觉语言有明确的历史来源。古罗马硬币以侧面像确认皇帝的神圣权威，启蒙时代的共和主义者用同样的图式重新激活了这一传统，自由女神、革命烈士、执政官，都以侧面像的形式在金属上留存。拿破仑继承了这套语言，将军事胜利与古典共和的正当性焊接在一起：我不是国王，我是凯撒尔。<br><br><strong>背面：一个假托的遗言</strong><br><br>背面铭文不假托语气，直接以第三人称宣告：献给他的荣耀战友，他最后的思念。圣赫勒拿，1821年5月5日。外圈镌刻的是服役年限：1792至1815年间的战役。顶部是帝国皇冠。<br><br>这套设计的逻辑是完整的：拿破仑死于流放地，死前记挂的是他的士兵；三十六年后，他的继承者把这份&ldquo;最后的思念&rdquo;铸成金属，发到仍然在世的老兵手中。那些在奥斯特里茨、耶拿、滑铁卢浴血的人，彼时已白发苍苍，在波旁王朝复辟后被历史遗忘。这枚奖章告诉他们：你们被记得，而且是以他的名义。<br><br>幕后的操盘者是拿破仑三世。他以伯父的姓氏当選总统，又以伯父的先例称帝。1857年颌布圣赫勒拿奖章，时机算计精准：传说已发酵为神话，老兵正在凋零，此时给予承认，代价极小，收益极大。<br><br>马克思在《路易·波拿巴的雾月十八日》里写道：&ldquo;一切伟大的世界历史事变和人物，可以说都出现两次……第一次是作为悲剧出现，第二次是作为笑剧出现。&rdquo;拿破仑一世的帝国是悲剧；这枚奖章，是笑剧的道具。尽管对领取它的老兵而言，那份情感并不是笑剧。<br><br>一枚硬币，两代帝国，一句假托的遗言，和马克思冷峻的旁白。" },
    { id:"c001", title:"鲁斯坦擒获中国可汗：波斯《列王纪》", date:"2026年", image:"images/chronicles/c001.jpg", excerpt:"波斯史诗《列王纪》中，英雄鲁斯坦在混战中生擒中国可汗——这不是历史记录，是伊朗世界对帝国边疆的文学想象。这页萨法维时期（16世纪后半叶）细密画手抄本插图，描绘的正是这一俘获时刻。画面中心，骑白马与粉马的核心人物构成全图权力轴线。叙事重心在于征服与秩序重建，将敌方统治者纳入己方体系。这是王权胜利的图像，而非武勇的炫示。<br><br>画家的技法高度成熟。人物、战马、武器、山石密集交叠，但依靠色块分区和墨线勾勒维持平面秩序——这正是萨法维细密画的核心能力：在极高的元素密度下维持可读秩序。背景的紫色与橙色山体并非自然写生，而是波斯绘画体系独有的视觉语言，赋予战场以园林与梦境的双重质感。右上方舒展的大树平衡了左侧密集战团，给暴力场景加上了诗意化的框架。上下两栏波斯文诗句（nastaliq 体）与画面构成完整的手抄本页面——图像不是独立挂画，文字不是旁注，整页是文学、书法与绘画共同成就的产物。" },
    { id:"c002", title:"一件美国仿珠宝的设计逻辑：Florenza 马耳他十字项链", date:"2026年", image:"images/treasures/t001.jpg", excerpt:"这件 Florenza 项链的设计核心策略，是以历史权威性抵消材料的非贵重属性。它同时采用两条手段：以数量与密度压制对材料本身的注意力，以历史叙事将价值判断从材料鉴定转移到符号辨认。两条路径相互强化而非干扰，在同期美国 costume jewelry 中并不多见。风格上，它是四套历史传统的有意识融合：文艺复兴复兴提供构图骨架（马耳他十字与徽章形制），伊特鲁里亚复兴提供工艺语言（掐丝视觉密度与深琥珀色调），维多利亚情感传统引入浪漫向度（心形母题的结构化处理），巴洛克复兴赋予戏剧张力（立体爪托与涡卷细节）。四套语汇各自承担不同的设计功能，并非随机拼贴。<br><br>此件在设计层面的核心成就，在于观者面对它时，首先被激活的不是材料鉴定的冲动，而是历史符号辨认的冲动——这本身便是设计策略成功的标志。庄严与浪漫两种本相悖的情绪向量，通过将心形处理为承载宝石的建筑构件而非独立的情感符号，获得了结构性的平衡。四重对称、三段式层级、中心锁定的放射构图，在极高的元素密度下维持了视觉秩序。铸造掐丝与模制玻璃石的材料层级构成了体验的物质边界，在自身所设定的目标与工艺约束之内，此件以罕见的完成度实现了它的设计意图。" },

function parseYear(y) {
  if (!y || y === '当代') return 9999;
  const n = parseInt(y.replace('约','').trim(), 10);
  return isNaN(n) ? 9999 : n;
}

function sortItems(items) {
  const hl = [...items].filter(i => i.highlight).sort((a,b) => parseYear(a.year)-parseYear(b.year));
  const rest = [...items].filter(i => !i.highlight).sort((a,b) => parseYear(a.year)-parseYear(b.year));
  return [...hl, ...rest];
}

function renderTabs() {
  document.getElementById("tabsBar").innerHTML = tabs.map(t =>
    '<button class="tab-btn '+(currentTab===t.key?'active':'')+'" onclick="switchTab(\''+t.key+'\')">'+t.label+'</button>'
  ).join("");
  document.querySelectorAll(".tab-content").forEach(e=>e.classList.remove("active"));
  const e=document.getElementById("tab-"+currentTab);
  if(e)e.classList.add("active");
}
function switchTab(k){currentTab=k;renderTabs();renderCurrentTab();window.scrollTo({top:0,behavior:'smooth'});}

  switch(currentTab){
    case "cabinet": renderCabinet(); break;
    case "regalia": renderCollection("regalia"); break;
    case "treasures": renderCollection("treasures"); break;
    case "chronicles": renderChronicles(); break;
    case "departures": renderDepartures(); break;
    case "gallery": renderGallery(); break;
  }
}

function renderChronicleCard(item, index) {
  const img = item.image ? '<img src="'+item.image+'" alt="'+item.title+'" loading="lazy">' : '<span class="item-placeholder">✦</span>';
  return '<div class="item-card" style="animation:fadeIn 0.4s ease '+(index*0.06)+'s both" onclick="openArticle(\''+item.id+'\')">'+
    '<div class="item-image">'+img+'</div><div class="item-info"><div class="item-title">'+item.title+'</div>'+
    '<div class="item-meta"></div></div></div>';
}

function renderCollection(key) {
  const allItems = collection[key]||[];
  const types = [...new Set(allItems.map(i=>i.type))];
  const af = filters[key]?.type||[];
  const filtered = af.length===0 ? allItems : allItems.filter(i=>af.includes(i.type));
  const sorted = sortItems(filtered);
  const tm={regalia:"礼服与华服",treasures:"勋章与珠宝"};
  const sm={regalia:"Uniform & Couture",treasures:"Medal & Jewellery"};
  let fh='';
  if(types.length>1){ // [CHANGE] 勋章与珠宝也显示分类器，条件从 key==='regalia' 改为通用
    fh='<div class="filter-bar"><button class="filter-btn '+(af.length===0?'active':'')+'" onclick="toggleFilter(\''+key+'\',\'all\')">全部</button>'+
      types.map(t=>'<button class="filter-btn '+(af.includes(t)?'active':'')+'" onclick="toggleFilter(\''+key+'\',\''+t+'\')">'+t+'</button>').join("")+'</div>';
  }
  document.getElementById("tab-"+key).innerHTML=
    '<div class="section-header"><div class="section-title">'+tm[key]+'</div><div class="section-subtitle">'+sm[key]+'</div></div>'+
    divider+fh+
    '<div class="featured-grid">'+sorted.map((i,n)=>renderCard(i,n,false)).join("")+'</div>';
}

function renderCard(item, index, isHighlightCtx) {
  const img = item.image ? '<img src="'+item.image+'" alt="'+item.title+'" loading="lazy">' : '<span class="item-placeholder">✦</span>';
  const st = item.forSale ? '<span class="item-tag sale">可出让</span>' : '';
  const tagHtml = isHighlightCtx ? '' : st;
  return '<div class="item-card" style="animation:fadeIn 0.4s ease '+(index*0.06)+'s both" onclick="openLightbox(\''+item.id+'\')">'+
    '<div class="item-image">'+img+'</div><div class="item-info"><div class="item-title">'+item.title+'</div>'+
    '<div class="item-meta"><span>'+(item.year||'')+'</span><span>'+(item.origin||'')+'</span>'+tagHtml+'</div></div></div>';
}

          items.map(g=>
            '<div class="gallery-item" onclick="openGalleryLightbox(\''+g.id+'\')">'+
              '<img src="'+g.image+'" alt="'+(g.caption||'')+'" loading="lazy" oncontextmenu="return false">'+
            '</div>'
          ).join("")+
        '</div>'
      :'<div class="curator-statement" style="color:var(--text-muted)">该分类暂无内容</div>');
}

// [CHANGE] New dedicated function for gallery lightbox — uses image src directly,
// caption as title (empty string is fine), no description needed for gallery items
window.openGalleryLightbox = function(id) {
  const item = collection.gallery.find(g => g.id === id);
  if (!item || !item.image) return;
  document.getElementById("lightboxImg").src = item.image;
  document.getElementById("lightboxTitle").textContent = item.caption || '';
  document.getElementById("lightboxDesc").textContent = '';
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = 'hidden';
};

// [CHANGE] toggleGalleryFilter: 单选逻辑，null=全部
window.toggleGalleryFilter=function(cat){
  galleryFilter = cat;
  renderGallery();
};
window.toggleFilter=function(k,v){
  if(v==='all')filters[k].type=[];
  else{const i=filters[k].type.indexOf(v);if(i>-1)filters[k].type.splice(i,1);else filters[k].type.push(v);}
  renderCollection(k);
};
function openLightbox(id){
  const all=[...collection.regalia,...collection.treasures,...collection.gallery];
  const item=all.find(i=>i.id===id);
  if(!item||!item.image)return;
  document.getElementById("lightboxImg").src=item.image;
  document.getElementById("lightboxTitle").textContent=item.title||item.caption||'';
  document.getElementById("lightboxDesc").textContent=item.description||'';
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow='hidden';
}
function closeLightbox(e){
  if(e.target===document.getElementById("lightbox")||e.target.classList.contains('lightbox-close')){
    document.getElementById("lightbox").classList.remove("open");document.body.style.overflow='';
  }
}
function openArticle(id){
  const a=collection.chronicles.find(c=>c.id===id);if(!a)return;
  if(a.image){document.getElementById("articleImg").src=a.image;document.getElementById("articleImg").style.display="";}
  else document.getElementById("articleImg").style.display="none";
  document.getElementById("articleTitle").textContent=a.title;
  document.getElementById("articleDate").textContent=a.date;
  document.getElementById("articleBody").innerHTML=a.excerpt;
  document.getElementById("articleModal").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeArticle(e){
  if(e.target===document.getElementById("articleModal")||e.target.classList.contains("article-modal-close")){
    document.getElementById("articleModal").classList.remove("open");document.body.style.overflow="";
  }
}
window.openLightbox=openLightbox;window.closeLightbox=closeLightbox;window.switchTab=switchTab;
window.openArticle=openArticle;window.closeArticle=closeArticle;
renderTabs();renderCurrentTab();
</script>
</body>
</html>
