<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汪楚尧 · 收藏与策展</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary:#FAF8F3; --bg-warm:#F5F2EB; --bg-card:#FFFFFF;
  --text-primary:#4A3728; --text-secondary:#5C4A3D; --text-muted:#9C948A;
  --gold:#8A4038; --gold-dim:#9E5248; --gold-glow:rgba(138,64,56,0.08);
  --heading-gold:#8A4038; --item-title:#6B3A2A;
  --border:#E8E3DA; --border-light:#EDE9E1;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg-primary);}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.header{text-align:center;padding:48px 24px 32px;background:linear-gradient(180deg,#F3F0E7 0%,var(--bg-primary) 100%);}
.header h1{font-family:'Noto Serif SC',serif;font-size:36px;font-weight:900;letter-spacing:8px;color:var(--heading-gold);}
.header-en{font-family:'Cinzel',serif;font-size:36px;font-weight:500;letter-spacing:4px;color:var(--heading-gold);margin-left:6px;text-transform:uppercase;}
.header-subtitle{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:600;color:var(--heading-gold);margin-top:14px;line-height:2;letter-spacing:2px;}

.neo-divider{display:flex;align-items:center;justify-content:center;gap:16px;padding:6px 0;width:50%;max-width:400px;margin:0 auto;}
.neo-divider .nd-line{flex:1;height:1px;background:var(--gold);opacity:0.5;}
.neo-divider .nd-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:0.6;flex-shrink:0;}

.tabs-container{position:sticky;top:0;z-index:100;background:rgba(250,248,243,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.tabs-bar{display:flex;flex-wrap:wrap;justify-content:center;max-width:960px;margin:0 auto;}
.tab-btn{padding:15px 24px;border:none;background:transparent;font-family:'Noto Serif SC',serif;font-size:18px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.3s;white-space:nowrap;position:relative;letter-spacing:2px;}
.tab-btn:hover{color:var(--text-secondary);}
.tab-btn.active{color:var(--heading-gold);font-weight:700;}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--gold);}

.main{max-width:960px;margin:0 auto;padding:0 20px 60px;}
.tab-content{display:none;animation:fadeIn 0.4s ease;}.tab-content.active{display:block;}

.section-header{text-align:center;padding:36px 0 8px;}
.section-title{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;color:var(--heading-gold);letter-spacing:4px;}
.section-subtitle{font-size:18px;color:var(--gold);margin-top:8px;font-family:'EB Garamond',serif;font-style:italic;letter-spacing:1px;}
.section-after-divider{padding-bottom:20px;}

.curator-statement{font-family:'Noto Serif SC',serif;font-size:18px;line-height:2.2;color:var(--heading-gold);max-width:580px;margin:0 auto;text-align:center;padding:12px 0 28px;}
.cabinet-statement{font-family:'Noto Serif SC',serif;font-size:18px;line-height:2;color:var(--heading-gold);max-width:580px;margin:0 auto;text-align:center;padding:14px 0 0;}
.cabinet-section-header{text-align:center;padding:12px 0 8px;}

.featured-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;padding:8px 0;}
.item-card{background:var(--bg-card);border:1px solid var(--border);border-radius:3px;overflow:hidden;cursor:pointer;transition:all 0.35s;position:relative;}
.item-card:hover{border-color:var(--gold);box-shadow:0 6px 24px rgba(0,0,0,0.06),0 0 0 1px var(--gold);transform:translateY(-3px);}
.item-card::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity 0.35s;}
.item-card:hover::before{opacity:0.6;}
.item-image{width:100%;background:var(--bg-warm);display:block;overflow:hidden;}
.item-image img{width:100%;height:auto;display:block;transition:transform 0.6s;}
.item-card:hover .item-image img{transform:scale(1.03);}
.item-placeholder{font-family:'Cinzel',serif;font-size:42px;color:var(--border);}
.item-info{padding:16px 18px;}
.item-title{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;color:var(--item-title);line-height:1.7;}
.item-meta{font-size:16px;color:var(--text-muted);margin-top:6px;display:flex;gap:12px;align-items:center;font-family:'EB Garamond',serif;}
.item-tag{display:inline-block;padding:2px 10px;border-radius:2px;font-size:15px;font-weight:500;color:var(--gold);background:var(--gold-glow);border:1px solid rgba(138,64,56,0.15);letter-spacing:1px;font-family:'Noto Sans SC',sans-serif;}
.item-tag.sale{color:#A5503C;background:rgba(165,80,60,0.06);border-color:rgba(165,80,60,0.15);}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:0 0 24px;}
.filter-btn{padding:7px 18px;border:1px solid var(--border);border-radius:2px;background:transparent;color:var(--text-muted);font-size:16px;font-family:'Noto Sans SC',sans-serif;font-weight:500;cursor:pointer;transition:all 0.2s;letter-spacing:1px;}
.filter-btn:hover{border-color:var(--text-muted);color:var(--text-secondary);}
.filter-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-glow);}

.chronicle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;padding:8px 0;}
.chronicle-card{background:var(--bg-card);border:1px solid var(--border);border-radius:3px;overflow:hidden;cursor:pointer;transition:all 0.35s;}
.chronicle-card:hover{border-color:var(--gold);box-shadow:0 6px 24px rgba(0,0,0,0.06);transform:translateY(-3px);}
.chronicle-card .card-img{width:100%;aspect-ratio:1/1;overflow:hidden;background:var(--bg-warm);}
.chronicle-card .card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s;}
.chronicle-card:hover .card-img img{transform:scale(1.03);}
.chronicle-card .card-info{padding:14px 16px;}
.chronicle-card .card-title{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:600;color:var(--item-title);line-height:1.7;}
.article-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:10000;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);overflow-y:auto;padding:40px 20px;}
.article-modal.open{display:block;}
.article-modal-inner{max-width:1080px;margin:0 auto;background:var(--bg-primary);border-radius:4px;padding:40px 36px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.article-modal-close{position:absolute;top:16px;right:20px;font-size:24px;color:var(--text-muted);cursor:pointer;background:none;border:none;transition:color 0.2s;}
.article-modal-close:hover{color:var(--text-primary);}
.article-img-stack{display:flex;flex-direction:column;gap:12px;max-width:720px;margin:0 auto 24px;}
.article-img-stack img{width:100%;height:auto;display:block;border-radius:3px;border:1px solid var(--border);}
.article-img-side{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:720px;margin:0 auto 24px;}
.article-img-side img{width:100%;height:auto;display:block;border-radius:3px;border:1px solid var(--border);}
.article-img-grid4{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:720px;margin:0 auto 24px;}
.article-img-grid4 img{width:100%;height:auto;display:block;border-radius:3px;border:1px solid var(--border);}
.article-modal-img{width:100%;max-width:720px;display:block;margin:0 auto 24px;border-radius:3px;border:1px solid var(--border);}
@media(max-width:640px){.article-img-side,.article-img-grid4{grid-template-columns:1fr;}}
.article-modal-title{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;color:var(--item-title);line-height:1.7;margin-bottom:8px;}
.article-modal-date{font-family:'EB Garamond',serif;font-size:16px;color:var(--text-muted);font-style:italic;margin-bottom:20px;}
.article-modal-body{font-family:'Noto Serif SC',serif;font-size:17px;line-height:2.2;color:var(--text-secondary);}

.gallery-grid{column-count:3;column-gap:12px;padding:8px 0;}
.gallery-item{
  break-inside:avoid;
  margin-bottom:12px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}
.gallery-item img{
  width:100%;
  display:block;
  -webkit-user-drag:none;
  transition:transform 0.45s ease, opacity 0.3s ease;
}
.gallery-item:hover img{
  transform:scale(1.04);
  opacity:0.88;
}
.gallery-item::after{
  content:'⊕';
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:rgba(250,248,243,0.9);
  opacity:0;
  transition:opacity 0.3s ease;
  pointer-events:none;
  text-shadow:0 1px 6px rgba(0,0,0,0.4);
}
.gallery-item:hover::after{opacity:1;}

.lightbox{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:10000;background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column;padding:40px;cursor:pointer;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90%;max-height:75vh;object-fit:contain;}
.lightbox-info{margin-top:20px;text-align:center;}
.lightbox-title{font-family:'Noto Serif SC',serif;font-size:23px;color:#F5F0E8;}
.lightbox-desc{font-size:17px;color:#A9A193;margin-top:8px;max-width:500px;line-height:1.8;font-family:'EB Garamond',serif;}
.lightbox-close{position:absolute;top:24px;right:28px;font-size:28px;color:#999;cursor:pointer;background:none;border:none;transition:color 0.2s;}
.lightbox-close:hover{color:#fff;}

.footer{text-align:center;padding:48px 24px;border-top:1px solid var(--border);}
.footer p{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:500;color:var(--gold);letter-spacing:2px;}
.footer p+p{margin-top:6px;}
.footer p span.en{font-family:'Cinzel',serif;letter-spacing:2px;margin-left:4px;}
.footer a{color:var(--gold);text-decoration:none;font-family:'Cinzel',serif;font-size:17px;letter-spacing:2px;}
.footer a:hover{text-decoration:underline;}

@media(max-width:640px){
  .header{padding:36px 16px 24px;}.header h1{font-size:24px;letter-spacing:4px;}.header-en{font-size:24px;letter-spacing:2px;margin-left:4px;}
  .tabs-bar{justify-content:center;padding:0 8px;}.tab-btn{padding:13px 14px;font-size:15px;}
  .featured-grid{grid-template-columns:repeat(2,1fr);gap:12px;}.chronicle-grid{grid-template-columns:repeat(2,1fr);gap:12px;}.gallery-grid{column-count:2;}
  .main{padding:0 14px 40px;}.item-info{padding:12px;}.item-title{font-size:15px;}
  .neo-divider{width:70%;}
}
</style>
</head>
<body>

<header class="header">
  <h1>汪楚尧 <span class="header-en">Julian</span></h1>
  <p class="header-subtitle">艺术品是对时间的僭越</p>
</header>

<nav class="tabs-container"><div class="tabs-bar" id="tabsBar"></div></nav>

<div class="main" id="mainContent">
  <div class="tab-content" id="tab-cabinet"></div>
  <div class="tab-content" id="tab-regalia"></div>
  <div class="tab-content" id="tab-treasures"></div>
  <div class="tab-content" id="tab-chronicles"></div>
  <div class="tab-content" id="tab-departures"></div>
  <div class="tab-content" id="tab-gallery"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox(event)">✕</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-info"><div class="lightbox-title" id="lightboxTitle"></div><div class="lightbox-desc" id="lightboxDesc"></div><a id="lightboxArticleLink" style="display:none;margin-top:16px;padding:7px 20px;border:1px solid rgba(245,240,232,0.5);border-radius:2px;color:#F5F0E8;font-family:'Noto Serif SC',serif;font-size:15px;letter-spacing:2px;text-decoration:none;cursor:pointer;transition:background 0.2s;" onmouseover="this.style.background='rgba(245,240,232,0.1)'" onmouseout="this.style.background='transparent'">了解物质文化</a></div>
</div>

<div class="article-modal" id="articleModal" onclick="closeArticle(event)">
  <div class="article-modal-inner" onclick="event.stopPropagation()">
    <button class="article-modal-close" onclick="closeArticle(event)">✕</button>
    <div id="articleImgContainer"></div>
    <div class="article-modal-title" id="articleTitle"></div>
    <div class="article-modal-date" id="articleDate"></div>
    <div class="article-modal-body" id="articleBody"></div>
  </div>
</div>

<footer class="footer">
  <div class="neo-divider" style="margin-bottom:20px"><div class="nd-line"></div><div class="nd-dot"></div><div class="nd-line"></div></div>
  <p>汪楚尧 <span class="en">Julian</span></p>
  <p style="margin-top:8px">微信联系 <span class="en">LondonHKSZ</span></p>
  <p><a href="https://curator.wangchuyao.com">curator.wangchuyao.com</a></p>
</footer>

<script>
const divider = '<div class="neo-divider section-after-divider"><div class="nd-line"></div><div class="nd-dot"></div><div class="nd-line"></div></div>';

const collection = {
  regalia: [
    { id:"r001", title:"皇家海军少将常礼服外套", year:"1982", origin:"英国", type:"仪式礼服", highlight:true, image:"images/regalia/r001.jpg", description:"Moseley & Pounsford 制，皇家海军少将（Rear Admiral）常礼服外套。海军蓝主色、中等厚度礼服毛呢、双排8金扣、金袖标。马岛战争谢菲尔德号沉没后，舰长返英订制。", articleLink:"c003", forSale:false },
    { id:"r002", title:"皇家炮兵少校梅斯礼服外套", year:"1992", origin:"英国", type:"晚宴梅斯礼服", highlight:false, image:"images/regalia/r002.jpg", description:"Gieves & Hawkes 制，皇家陆军炮兵少校（Major）梅斯礼服外套。黑主色、红翻领、中等厚度礼服毛呢、前敞开、侧翼金扣，丝绸内衬。", forSale:false },
    { id:"r003", title:"皇家空军上校梅斯礼服全套", year:"1956", origin:"英国", type:"晚宴梅斯礼服", highlight:false, image:"images/regalia/r003.jpg", description:"Gieves 制，皇家空军上校（Group Captain）梅斯礼服外套、马甲、长裤。蓝灰主色、中等厚度毛呢、前对扣闭合、侧翼金扣、黑色翻领，含飞行员刺绣徽章，对应空军基地指挥官身份。", forSale:false },
    { id:"r004", title:"皇家陆军医疗军团少校梅斯礼服", year:"1964", origin:"英国", type:"晚宴梅斯礼服", highlight:true, image:"images/regalia/r004.jpg", description:"Alkit 制，皇家陆军医疗军团少校（Major）梅斯礼服外套和马甲。黑主色、紫礼服领、中等厚度毛呢、前敞开、侧翼金扣，含杖蛇医疗徽章，与帝国战争博物馆诺曼底登陆口述史相印证。", forSale:false },
    { id:"r005", title:"皇家海军少校梅斯礼服外套", year:"1945", origin:"英国", type:"晚宴梅斯礼服", highlight:false, image:"images/regalia/r005.jpg", description:"Gieves 制，皇家海军少校（Lieutenant Commander）梅斯礼服外套。海军蓝主色、较厚礼服毛呢、前对扣闭合、侧翼金扣，金袖标。", forSale:false },
    { id:"r006", title:"法国医务军官大礼服外套", year:"约1931", origin:"法国", type:"仪式礼服", highlight:false, image:"images/regalia/r006.jpg", description:"Paris Thorn 制，1931式法国医务军官上尉大礼服外套。中厚挺括礼服毛呢、黑主色、红丝绒领口和袖口、领口饰以权杖与蛇金属线浮雕、单排9粒扣含镀金的权杖与蛇浮雕、红丝绒袖口和领边。", articleLink:"c005", forSale:false },
    { id:"r007", title:"意大利陆军军需兵团晚礼服", year:"约1934", origin:"意大利", type:"仪式礼服", highlight:false, image:"images/regalia/r007.jpg", description:"1934式意大利王家陆军军需兵团上尉晚礼服外套。中厚礼服毛呢、黑主色、双排外张14金扣、紫丝绒领边、紫王冠肩章、深蓝丝绒袖口。", forSale:false },
    { id:"r009", title:"巴尔曼巴洛克复兴刺绣长外套", year:"当代", origin:"法国", type:"高级时装", highlight:false, image:"images/regalia/r009.jpg", description:"巴尔曼珍珠与水晶密镶长款礼服外套，香槟色，高定级别工艺。数百颗珍珠与水晶逐粒手工缝缀，刺绣构成对称的巴洛克纹样。剪裁具建筑感，结构精确，丝绸全衬里。即使在巴尔曼的标志性重工系列中，此件在密度、对称性与工艺精度上仍属罕见。", forSale:false },
    { id:"r010", title:"Moschino 拿破仑廓形黑色外套", year:"当代", origin:"意大利", type:"高级时装", highlight:false, image:"images/regalia/r010.jpg", description:"Moschino 拿破仑风格黑色外套，意大利制，初剪羊毛面料，黑色丝绒拼接。宽幅拿破仑翻领、丝绒镶边立领、丝绒翻折袖口，标志性金色球扣。两枚皇冠形倒置口袋盖各饰三粒金球。裁剪硬朗，下摆刻意不对称，轮廓锋利。", forSale:false },
    { id:"r012", title:"巴宝莉军礼服式短外套", year:"当代", origin:"英国", type:"高级时装", highlight:false, image:"images/regalia/r012.jpg", description:"巴宝莉海军蓝军事风短外套，羊绒羊毛混纺。拿破仑式立领、三排金扣、盾徽浮雕扣、肩章、猩红色衬里。", forSale:false },
    { id:"r014", title:"巴宝莉秀场款猩红骠骑兵短外套", year:"当代", origin:"英国", type:"高级时装", highlight:false, image:"images/regalia/r014.jpg", description:"巴宝莉秀场款猩红色羊毛短外套，取法拿破仑时期骠骑兵制服。双排银质浮雕扣配横向编织扣绊，短身长臂剪裁，猩红色呼应线列步兵时代军装配色。", forSale:false },
    { id:"r013", title:"西点军校学员大礼服", year:"约1950", origin:"美国", type:"仪式礼服", highlight:false, image:"images/regalia/r013.jpg", description:"美国西点军校（USMA）学员大礼服外套。深蓝色重磅羊毛，立领，三排金属扣，袖口与下摆黑色编织装饰。20世纪中期。", forSale:false },
  ],
  treasures: [
    { id:"t002", title:"圣赫勒拿奖章", year:"1857", origin:"法国", type:"勋章", highlight:true, image:"images/treasures/t002.jpg", description:"1857年拿破仑三世设立，授予1792至1815年间服役的拿破仑大军团幸存老兵。正面为拿破仑一世侧面像，环以月桂花环，顶部帝国皇冠。背面铭文以拿破仑名义宣告，凝聚老兵情感与集体记忆。此为法国首枚正式战役纪念章，弥补了拿破仑一世未为士兵设立纪念章的空白。", articleLink:"c004", forSale:false },
    { id:"t004", title:"乔治五世与玛丽王后加冕纪念章", year:"1911", origin:"英国", type:"纪念币", highlight:false, image:"images/treasures/t004.jpg", description:"1911年乔治五世与玛丽王后加冕纪念镀金章。正面为国王与王后并列侧面像；背面由 Elect Cocoa 公司发行，属商业赞助纪念章。附原装红色皮盒。尺寸 4×3.1 厘米，重 18.6 克。", forSale:false },
    { id:"t003", title:"伊丽莎白二世银禧纪念章项链", year:"1977", origin:"英国", type:"珠宝", highlight:false, image:"images/treasures/t003.jpg", description:"英国皇家铸币局 Crown of Crowns 系列，22K 镀金纪念章，纪念伊丽莎白二世登基银禧（1977）。正面为女王骑马像；背面呈现加冕鹰徽，辅以繁复花饰纹样。镶入金属框架配链，附原装蓝色绒盒。", forSale:false },
    { id:"t001", title:"巴洛克复兴马耳他十字项链", year:"约1960", origin:"美国", type:"珠宝", highlight:true, image:"images/treasures/t001.jpg", description:"Florenza 多链琥珀色玻璃石项链，铸造掐丝工艺，立体爪托镶嵌，马耳他十字与心形母题，四重对称放射构图。文艺复兴、伊特鲁里亚、维多利亚与巴洛克四套历史语汇的融合体，是 Florenza 设计意图最完整的作品类型之一。", articleLink:"c002", forSale:false },
    { id:"t005", title:"乔治六世加冕纪念克朗", year:"1937", origin:"英国", type:"纪念币", highlight:false, image:"images/treasures/t005.jpg", description:"1937年乔治六世加冕纪念版银质克朗，英国皇家铸币局发行，50%银含量。正面为乔治六世左向肖像；背面为皇家纹章，狮与独角兽护盾。", forSale:false },
    { id:"t006", title:"君士坦丁红十字骑士团胸章", year:"当代", origin:"英国", type:"勋章", highlight:false, image:"images/treasures/t006.jpg", description:"君士坦丁红十字骑士团主事官级胸章（纪念版）。紫色罗缎绶带，錾花金质长方形别针；绶带下悬主教冠形金质吊饰，标志主事官职级。主体为红色珐琅四叶形章体，金色叠加凯乐符号（Chi-Rho，X·P）及字母 I·H·S·V，为该骑士团专属基督教密语体系。君士坦丁红十字骑士团是与共济会相关的基督教兄弟会，会员以英国及英联邦精英阶层为主，礼仪等级通过可穿戴符号严格编码。", forSale:false },
    { id:"t007", title:"比特币镀金纪念币", year:"当代", origin:"美国", type:"纪念币", highlight:false, image:"images/treasures/t007.jpg", description:"市售镀金铜质纪念章，正面为比特币符号、格言与电路板纹样，为加密货币文化的物质化产物。比特币以去物质化为核心意识形态，其纪念章却沿用了最古老的权力造像逻辑：镀金、圆形、铭文，即以传统金币的形式为其竞争者背书。", forSale:false },
    { id:"t008", title:"金色流苏项链", year:"约1960", origin:"意大利", type:"珠宝", highlight:false, image:"images/treasures/t008.jpg", description:"可能为1960年代意大利产。镀金编织网带为主链，密排琥珀色爪托玻璃石沿边缘延伸，中心矩形座以多列玻璃石构成几何面，向下发散为多股网链与石链交织的流苏坠。流苏作为欧洲宫廷礼服的传统装饰元素，在二十世纪中期经由意大利金属制造工业的规模化生产，完成了从贵族服饰语汇向大众佩戴的转译；镀金网带与玻璃石的组合正是这一工艺传统的典型表达。", forSale:false },
    { id:"t009", title:"黄铜镂空三联项链", year:"约1930", origin:"捷克", type:"珠宝", highlight:false, image:"images/treasures/t009.jpg", description:"可能为1930年代捷克产。冲压黄铜镂空花卉三联构图，涡卷与花瓣骨架内嵌蓝色玻璃石，大中小分级排布。此类工艺与配色高度对应二十世纪初期波西米亚出口仿珠宝传统，彼时捷克地区以低成本金属冲压与玻璃石镶嵌技术向西欧及北美市场大规模供应装饰性珠宝。蓝色玻璃石的选用在当时兼具视觉可及性与蓝宝石联想的双重功能。", forSale:false },
    { id:"t010", title:"最优秀的大英帝国勋章指挥官级", year:"当代", origin:"英国", type:"勋章", highlight:false, image:"images/treasures/t010.jpg", description:"最优秀的大英帝国勋章（1917年乔治五世设立）是迄今规模最大的英国荣誉体系，其视觉语言将女神图像、帝国誓言与等级编码焊接为单一物件。此枚纪念版对应1937年以前指挥官级民事版本：蓝色珐琅花形四臂章体，中心红色环形铭文 FOR GOD AND THE EMPIRE 围绕不列颠尼亚女神金像，头戴罗马式头盔，手持三叉戟，在日不落太阳下端坐海洋之上，帝国皇冠顶饰，紫色颈绶。", forSale:false },
    { id:"t011", title:"荣誉军团勋章骑士级", year:"当代", origin:"法国", type:"勋章", highlight:false, image:"images/treasures/t011.jpg", description:"荣誉军团于1802年由拿破仑设立，以跨越出身的功绩逻辑取代旧制度的世袭荣誉体系，同时将帝国权威的完整图像系统嵌入其视觉设计，功绩原则与帝国象征的并置，是拿破仑制度建构的核心策略之一。此枚纪念版为第一帝国样式，铭文 NAPOLÉON EMPEREUR DES FRANÇAIS 环绕拿破仑一世侧面像，HONNEUR ET PATRIE 围绕帝国展翼鹰，白色珐琅五角星臂间饰绿色橡树与橄榄枝，帝国皇冠顶饰。", forSale:false },

  chronicles: [
    { id:"c003", title:"一件礼服的战争与和平", date:"2026年", image:"images/regalia/r001.jpg", image2:"images/chronicles/c003b.jpg", imageLayout:"stack", excerpt:"1982年5月4日，南大西洋。谢菲尔德号驱逐舰遭阿根廷海军的飞鱼导弹击中，导弹击穿舰体引发大火，舰长萨姆·索尔特下令弃舰。谢菲尔德号随后沉没，成为二战结束后第一艘被击沉的皇家海军战舰。二十名船员在这次袭击中罹难。<br><br>索尔特返回英国后，于1982年6月1日在 Moseley &amp; Pounsford 定制了这件礼服外套。时间的选择耐人寻味：此时议会和媒体对谢菲尔德号事件的追责正在进行。这件礼服使人难以不将其与战后的问责程序和身份修复联系起来；至少在象征层面，它标志着一名指挥官在舆论漩涡中重新确立自身位置的努力。<br><br>在战争胜利气氛中，索尔特最终未被追责。此后他相继指挥南安普顿号驱逐舰，出任北伍德司令部作战助理参谋长，后升任国防情报局局长，晋升海军少将，主持海湾战争的皇家海军战略规划。1991年退役。2009年，索尔特去世，享年六十九岁。<br><br>这件外套因此成为一个问题的物质载体：荣耀在挫败之后，如何通过自身努力和制度宽容重新组织。" },
    { id:"c004", title:"两枚面孔，两个拿破仑", date:"2026年", image:"images/treasures/t002.jpg", image2:"images/chronicles/c004b.jpg", imageLayout:"side", excerpt:"<strong>正面：侧面像的政治学</strong><br><br>圣赫勒拿奖章正面，拿破仑一世以罗马皇帝的姿态出现：严格的侧面像，月桂花环加冕，头衔环绕。这套视觉语言有明确的历史来源。古罗马硬币以侧面像确认皇帝的神圣权威，启蒙时代的共和主义者用同样的图式重新激活了这一传统：自由女神、革命烈士、执政官，都以侧面像的形式在金属上留存。拿破仑继承了这套语言，将军事胜利与古典共和的正当性焊接在一起：我不是国王，我是凯撒。<br><br><strong>背面：一个假托的遗言</strong><br><br>背面铭文宣告：献给拿破仑的荣耀战友，他最后的思念。圣赫勒拿，1821年5月5日。外圈镌刻的是服役年限：1792至1815年诸战役。顶部是帝国皇冠。<br><br><strong>奖章的整体逻辑</strong><br><br>这套设计的意图是：拿破仑死于流放地，死前记挂的是他的士兵；三十六年后，他的继承者把这份&ldquo;最后的思念&rdquo;铸成金属，发到仍然在世的老兵手中。那些在奥斯特里茨、耶拿、滑铁卢浴血的人，彼时已白发苍苍，在波旁王朝复辟后一度被历史遗忘。这枚奖章告诉他们：你们被当时和现在的拿破仑记得。<br><br>幕后的操盘者是拿破仑三世。他以拿破仑一世的姓氏当选总统、政变称帝。1857年颁布圣赫勒拿奖章，时机算计精准：传说已发酵为神话，老兵正在凋零，此时给予承认，代价极小，收益极大。<br><br>马克思写道，一切伟大的世界历史事变和人物都出现两次：第一次是作为悲剧出现，第二次是作为笑剧出现。这一判断对拿破仑三世而言是准确的。但那些年迈的老兵，当他们接过这枚奖章时，触碰的是多年前真实流过的血与泥。宣传技术与真实情感在这枚奖章上重叠，这正是它作为历史物件最难被单一叙事收编的地方。" },
    { id:"c001", title:"鲁斯坦擒获中国可汗：波斯《列王纪》", date:"2026年", image:"images/chronicles/c001.jpg", imageLayout:"single", excerpt:"波斯史诗《列王纪》中，英雄鲁斯坦在混战中生擒中国可汗：这不是历史记录，是波斯（今伊朗）世界对帝国边疆的文学想象。这页波斯帝国萨法维时期（16世纪后半叶）细密画手抄本插图，描绘的正是这一俘获时刻。画面中心，骑粉马、穿锦袍的鲁斯坦牵着左边骑白马的中国可汗，二者构成全图权力轴线。周围穿着相对朴素盔甲的侍从次第环绕，最外围是理想化的自然。叙事重心在于征服与秩序重建，将敌方统治者纳入己方体系。这是王权胜利的图像，而非武勇的炫示。<br><br>画家的技法高度成熟。人物、战马、武器、山石密集交叠，但依靠色块分区和墨线勾勒维持平面秩序。这正是萨法维细密画的核心能力：在极高的元素密度下维持可读秩序。背景的紫色与橙色山体并非自然写生，而是波斯绘画体系独有的视觉语言，赋予战场以园林与梦境的双重质感。右上方舒展的大树平衡了左侧密集战团，给暴力场景加上了诗意化的框架。上下两栏波斯文诗句与画面构成完整的手抄本页面，整页是文学、书法与绘画共同成就的产物。" },
    { id:"c005", title:"法国陆军医官礼服的制度剖析", date:"2026年", image:"images/regalia/r006.jpg", image2:"images/regalia/r006b.jpg", image3:"images/regalia/r006c.jpg", image4:"images/regalia/r006d.jpg", imageLayout:"grid4", excerpt:"<strong>工艺</strong><br><br>这件礼服出自巴黎第八区 Thorn，1 rue de la pépinière，彼时该地址是法国军服定制业的核心门牌，客户以军官及外交官为主。面料为中厚挺括礼服毛呢，黑色，织物密度足以支撑直身廓形。单排9粒扣沿前襟垂直排列，扣面以黄铜铸造，浮雕图案为权杖缠蛇外环月桂，赫尔墨斯权杖的医疗变体，每粒扣均是一枚微型的身份宣言。<br><br>领部与袖口以深红丝绒包覆，切割边缘利落，与黑色毛呢的交界处收口无毛边。领片两侧各施一组金线手工刺绣：左侧橄榄枝，右侧蓟花，以管状金属丝构成，密度均匀，九十年后光泽与张力仍在。袖口丝绒之上，两道金色织带横贯，金线走向规整，是法国军服刺绣工艺的标准高输出。<br><br>整件礼服体现了法兰西制服美学的核心逻辑：以裁缝的精度代替装饰的堆砌，将布料、丝绒、金线与金属扣的材料层级压入严格的几何秩序，使礼服获得建筑与雕塑的同时感，它不是被穿着的，它是被构筑的。<br><br><strong>风格与制度含义</strong><br><br>黑色礼服毛呢配深红丝绒，是第三共和国时期法国军医系统礼服的标准配色，区别于步兵藏蓝、炮兵深绿，颜色本身即是兵种编码，无需语言说明。单排扣廓形在同期法国陆军礼服中对应文职与技术兵种，作战兵种多用双排扣，医官以单排扣区隔，将持有者定位为制度的技术支柱而非武力代理人。<br><br>9粒权杖缠蛇扣沿前襟构成一条垂直的身份轴线，从领口延伸至腰部。这套视觉语言的运作方式是累积而非宣示：在正式场合的每一次视线接触中，兵种、职级与机构归属同时完成识别，无需持有者开口。礼服由此成为国家通过个人身体进行的一次持续性的制度表达。" },
    { id:"c002", title:"一件仿珠宝的设计逻辑：Florenza 马耳他十字项链", date:"2026年", image:"images/treasures/t001.jpg", image2:"images/chronicles/c002b.jpg", image3:"images/chronicles/c002c.jpg", image4:"images/chronicles/c002d.jpg", imageLayout:"grid4", excerpt:"自上而下观赏这件 Florenza 项链。视线首先遇到的是巴洛克掐丝心形小吊坠：体量细小，却以立体爪托与涡卷细节预告了整串的主题和工艺密度。视线继续下移，花瓣形中心座以铸造掐丝构成对称的放射骨架，将四重构图秩序带入视野；马耳他十字主吊坠随即展开，以徽章形制确立整串的历史语义重心。圆形宝石与马眼形宝石分布于各节点，深琥珀色调回应了伊特鲁里亚复兴的色彩传统，在维持视觉密度的同时锁定了情绪基调。<br><br>这件项链的设计核心策略，是以历史权威性抵消材料的非贵重属性，同时采用两条手段：以数量与密度压制对材料本身的注意力，以历史叙事将价值判断从材料鉴定转移到符号辨认。风格上，它是四套历史传统的有意识融合：文艺复兴风格复兴提供构图骨架，伊特鲁里亚复兴提供工艺语言，维多利亚情感传统引入浪漫向度，巴洛克复兴赋予戏剧张力，四套语汇各自承担不同的设计功能。<br><br>通过将心形处理为承载宝石的建筑构件而非独立的情感符号，庄严与浪漫两种本相悖的情绪向量获得了结构性的平衡。铸造掐丝与模制玻璃石的材料层级构成了体验的物质边界，而在自身目标与工艺约束之内，此件以罕见的完成度实现了它的设计意图。" },

function parseYear(y) {
  if (!y || y === '当代') return 9999;
  const n = parseInt(y.replace('约','').trim(), 10);
  return isNaN(n) ? 9999 : n;
}

function sortItems(items) {
  const hl = [...items].filter(i => i.highlight).sort((a,b) => parseYear(a.year)-parseYear(b.year));
  const rest = [...items].filter(i => !i.highlight).sort((a,b) => parseYear(a.year)-parseYear(b.year));
  return [...hl, ...rest];
}

function renderTabs() {
  const hasDepartures = [...collection.regalia,...collection.treasures].some(i=>i.forSale);
  const visibleTabs = tabs.filter(t => t.key !== 'departures' || hasDepartures);
  if (!hasDepartures && currentTab === 'departures') { currentTab = 'cabinet'; }
  document.getElementById("tabsBar").innerHTML = visibleTabs.map(t =>
    '<button class="tab-btn '+(currentTab===t.key?'active':'')+'" onclick="switchTab(\''+t.key+'\')">'+t.label+'</button>'
  ).join("");
  document.querySelectorAll(".tab-content").forEach(e=>e.classList.remove("active"));
  const e=document.getElementById("tab-"+currentTab);
  if(e)e.classList.add("active");
}
function switchTab(k){currentTab=k;renderTabs();renderCurrentTab();window.scrollTo({top:0,behavior:'smooth'});}
function renderCurrentTab(){
  switch(currentTab){
    case "cabinet": renderCabinet(); break;
    case "regalia": renderCollection("regalia"); break;
    case "treasures": renderCollection("treasures"); break;
    case "chronicles": renderChronicles(); break;
    case "departures": renderDepartures(); break;
    case "gallery": renderGallery(); break;
  }
}

function renderCabinet() {
  const featuredIds = ["r006","r009","r004","r001","t002","t001"];
  const all = [...collection.regalia, ...collection.treasures];
  const featured = featuredIds.map(id => all.find(i => i.id===id)).filter(Boolean);
  const chronicleFeatured = null;
  document.getElementById("tab-cabinet").innerHTML =
    '<div class="cabinet-statement" style="font-family:\'Noto Serif SC\',serif;font-size:22px;font-weight:700;color:var(--heading-gold);padding-top:16px;padding-bottom:4px;line-height:1.7;text-align:center;letter-spacing:4px;">在时间中重构审美、身份与权力的物质表达</div>' +
    '<div class="section-header" style="padding-top:20px;padding-bottom:8px"><div class="section-title">精选藏品</div><div class="section-subtitle">Highlights</div></div>' +
    divider +
    '<div class="featured-grid">' +
      featured.map((i,n) => renderCard(i,n,true)).join("") +
      (chronicleFeatured ? renderChronicleCard(chronicleFeatured, featured.length) : '') +
    '</div>';
}

function renderChronicleCard(item, index) {
  const img = item.image ? '<img src="'+item.image+'" alt="'+item.title+'" loading="lazy">' : '<span class="item-placeholder">✦</span>';
  return '<div class="item-card" style="animation:fadeIn 0.4s ease '+(index*0.06)+'s both" onclick="openArticle(\''+item.id+'\')">'+
    '<div class="item-image">'+img+'</div><div class="item-info"><div class="item-title">'+item.title+'</div>'+
    '<div class="item-meta"></div></div></div>';
}

function renderCollection(key) {
  const allItems = collection[key]||[];
  const types = [...new Set(allItems.map(i=>i.type))];
  const af = filters[key]?.type||[];
  const filtered = af.length===0 ? allItems : allItems.filter(i=>af.includes(i.type));
  const sorted = sortItems(filtered);
  const tm={regalia:"礼服与华服",treasures:"勋章与珠宝"};
  const sm={regalia:"Uniform & Couture",treasures:"Medal & Jewellery"};
  let fh='';
  if(types.length>1){
    fh='<div class="filter-bar"><button class="filter-btn '+(af.length===0?'active':'')+'" onclick="toggleFilter(\''+key+'\',\'all\')">全部</button>'+
      types.map(t=>'<button class="filter-btn '+(af.includes(t)?'active':'')+'" onclick="toggleFilter(\''+key+'\',\''+t+'\')">'+t+'</button>').join("")+'</div>';
  }
  document.getElementById("tab-"+key).innerHTML=
    '<div class="section-header"><div class="section-title">'+tm[key]+'</div><div class="section-subtitle">'+sm[key]+'</div></div>'+
    divider+fh+
    '<div class="featured-grid">'+sorted.map((i,n)=>renderCard(i,n,false)).join("")+'</div>';
}

function renderCard(item, index, isHighlightCtx) {
  const img = item.image ? '<img src="'+item.image+'" alt="'+item.title+'" loading="lazy">' : '<span class="item-placeholder">✦</span>';
  const st = item.forSale ? '<span class="item-tag sale">可出让</span>' : '';
  const tagHtml = isHighlightCtx ? '' : st;
  return '<div class="item-card" style="animation:fadeIn 0.4s ease '+(index*0.06)+'s both" onclick="openLightbox(\''+item.id+'\')">'+
    '<div class="item-image">'+img+'</div><div class="item-info"><div class="item-title">'+item.title+'</div>'+
    '<div class="item-meta"><span>'+(item.year||'')+'</span><span>'+(item.origin||'')+'</span>'+tagHtml+'</div></div></div>';
}

function renderChronicles() {
  document.getElementById("tab-chronicles").innerHTML=
    '<div class="section-header"><div class="section-title">物质文化</div><div class="section-subtitle">Material Culture</div></div>'+
    divider+
    '<div class="chronicle-grid">'+collection.chronicles.map((a,i)=>
      '<div class="chronicle-card" style="animation:fadeIn 0.4s ease '+(i*0.06)+'s both" onclick="openArticle(\''+a.id+'\')">'+
        (a.image?'<div class="card-img"><img src="'+a.image+'" alt="'+a.title+'" loading="lazy"></div>':'')+
        '<div class="card-info"><div class="card-title">'+a.title+'</div></div></div>'
    ).join("")+'</div>';
}

function renderDepartures() {
  const fs=[...collection.regalia,...collection.treasures].filter(i=>i.forSale);
  document.getElementById("tab-departures").innerHTML=
    '<div class="section-header"><div class="section-title">甄选出让</div><div class="section-subtitle">Available Pieces</div></div>'+
    divider+
    '<div class="curator-statement" style="padding-bottom:16px">以下藏品可转让，欢迎通过页尾方式联系。</div>'+
    (fs.length>0
      ?'<div class="featured-grid" style="padding-top:8px">'+fs.map((i,n)=>renderCard(i,n,false)).join("")+'</div>'
      :'<div class="curator-statement" style="color:var(--text-muted)">暂无出让藏品</div>');
}

function renderGallery() {
  const allCats=["艺术掠影","藏品穿搭"];
  const items=collection.gallery.filter(g=>g.image&&(galleryFilter===null||g.category===galleryFilter));
  const filterHtml='<div class="filter-bar">'+
    '<button class="filter-btn '+(galleryFilter===null?'active':'')+'" onclick="toggleGalleryFilter(null)">全部</button>'+
    allCats.map(c=>'<button class="filter-btn '+(galleryFilter===c?'active':'')+'" onclick="toggleGalleryFilter(\''+c+'\')">'+c+'</button>').join("")+
  '</div>';
  document.getElementById("tab-gallery").innerHTML=
    '<div class="section-header"><div class="section-title">画廊</div><div class="section-subtitle">Gallery</div></div>'+
    divider+filterHtml+
    (items.length>0
      ? '<div class="gallery-grid">'+
          items.map(g=>
            '<div class="gallery-item" onclick="openGalleryLightbox(\''+g.id+'\')">'+
              '<img src="'+g.image+'" alt="'+(g.caption||'')+'" loading="lazy" oncontextmenu="return false">'+
            '</div>'
          ).join("")+
        '</div>'
      :'<div class="curator-statement" style="color:var(--text-muted)">该分类暂无内容</div>');
}

window.openGalleryLightbox = function(id) {
  const item = collection.gallery.find(g => g.id === id);
  if (!item || !item.image) return;
  document.getElementById("lightboxImg").src = item.image;
  document.getElementById("lightboxTitle").textContent = item.caption || '';
  document.getElementById("lightboxDesc").textContent = '';
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = 'hidden';
};

window.toggleGalleryFilter=function(cat){
  galleryFilter = cat;
  renderGallery();
};
window.toggleFilter=function(k,v){
  if(v==='all') filters[k].type=[];
  else filters[k].type=[v];
  renderCollection(k);
};
function openLightbox(id){
  const all=[...collection.regalia,...collection.treasures,...collection.gallery];
  const item=all.find(i=>i.id===id);
  if(!item||!item.image)return;
  document.getElementById("lightboxImg").src=item.image;
  document.getElementById("lightboxTitle").textContent=item.title||item.caption||'';
  document.getElementById("lightboxDesc").textContent=item.description||'';
  const linkEl=document.getElementById("lightboxArticleLink");
  if(item.articleLink){
    linkEl.style.display='inline-block';
    linkEl.onclick=function(e){e.stopPropagation();closeLightbox({target:document.getElementById("lightbox")});openArticle(item.articleLink);};
  } else {
    linkEl.style.display='none';
  }
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow='hidden';
}
function closeLightbox(e){
  if(e.target===document.getElementById("lightbox")||e.target.classList.contains('lightbox-close')){
    document.getElementById("lightbox").classList.remove("open");document.body.style.overflow='';
  }
}
function openArticle(id){
  const a=collection.chronicles.find(c=>c.id===id);if(!a)return;
  const container=document.getElementById("articleImgContainer");
  function imgEl(src){return '<img src="'+src+'" alt="" loading="lazy">';}
  function tryImg(src,cls){
    // only emit the img tag; missing images simply show broken icon which is acceptable
    return imgEl(src);
  }
  if(a.imageLayout==="stack"){
    container.innerHTML='<div class="article-img-stack">'+imgEl(a.image)+(a.image2?imgEl(a.image2):'')+'</div>';
  } else if(a.imageLayout==="side"){
    container.innerHTML='<div class="article-img-side">'+imgEl(a.image)+(a.image2?imgEl(a.image2):'')+'</div>';
  } else if(a.imageLayout==="grid4"){
    const imgs=[a.image,a.image2,a.image3,a.image4].filter(Boolean);
    container.innerHTML='<div class="article-img-grid4">'+imgs.map(s=>imgEl(s)).join('')+'</div>';
  } else if(a.image){
    container.innerHTML='<img class="article-modal-img" src="'+a.image+'" alt="">';
  } else {
    container.innerHTML='';
  }
  document.getElementById("articleTitle").textContent=a.title;
  document.getElementById("articleDate").textContent="";
  document.getElementById("articleBody").innerHTML=a.excerpt;
  document.getElementById("articleModal").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeArticle(e){
  if(e.target===document.getElementById("articleModal")||e.target.classList.contains("article-modal-close")){
    document.getElementById("articleModal").classList.remove("open");document.body.style.overflow="";
  }
}
window.openLightbox=openLightbox;window.closeLightbox=closeLightbox;window.switchTab=switchTab;
window.openArticle=openArticle;window.closeArticle=closeArticle;
renderTabs();renderCurrentTab();
</script>
</body>
</html>
